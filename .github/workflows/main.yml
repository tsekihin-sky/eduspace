name: Build Unsigned iOS App

# This tells GitHub to run the script whenever you push code or click a manual button
on:
  push:
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:
  build:
    # This is the magic part: renting a free Mac from GitHub
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the iOS app (Unsigned)
      run: |
        # IMPORTANT: Change "YourProject" to your actual project name!
        xcodebuild clean build \
          -project eduspace.xcodeproj \
          -scheme eduspace \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Package the .ipa file
      run: |
        # Find where Xcode hid the compiled .app file
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
        echo "Found app at $APP_PATH"
        
        # Package it exactly how Apple expects (the Payload folder trick)
        mkdir Payload
        cp -r "$APP_PATH" Payload/
        zip -qr app.ipa Payload

    - name: Upload .ipa so you can download it
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-ios-app
        path: app.ipa
