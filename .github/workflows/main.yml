name: Build Unsigned iOS App

env:
  # This fixes the Node.js warning you saw earlier
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: See what files the Mac sees (Debugging)
      run: ls -la

    - name: Build the iOS app (Unsigned)
      run: |
        # Building the eduspace project
        xcodebuild clean build \
          -workspace "eduspace.xcworkspace" \
          -scheme "eduspace" \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Package the .ipa file
      run: |
        # Find where Xcode hid the compiled .app file
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
        echo "Found app at $APP_PATH"
        
        # Package it into the Payload folder to create the .ipa
        mkdir Payload
        cp -r "$APP_PATH" Payload/
        zip -qr app.ipa Payload

    - name: Upload .ipa so you can download it
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-ios-app
        path: app.ipa
