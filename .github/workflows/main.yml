name: Build Unsigned iOS App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the iOS app (Unsigned)
      run: |
        xcodebuild clean build \
          -workspace "ios/EdUSpace.xcworkspace" \
          -scheme "EdUSpace" \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          -configuration Release \
          SYMROOT="${{ github.workspace }}/build" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package the .ipa file
      run: |
        APP_PATH=$(find "${{ github.workspace }}/build" -name "*.app" -not -path "*/PlugIns/*" | head -n 1)
        echo "Found app at: $APP_PATH"

        mkdir Payload
        cp -r "$APP_PATH" Payload/
        zip -qr app.ipa Payload/

    - name: Upload .ipa so you can download it
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-ios-app
        path: app.ipa
